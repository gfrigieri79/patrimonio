<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patrimônio Pro | Gestão de Elite</title>
    
    <meta name="theme-color" content="#10b981">
    <link rel="manifest" href="manifest_patrimonio.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2489/2489756.png">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #10b981; --bg: #f8fafc; --sidebar: #ffffff; --card: #ffffff; --text-main: #0f172a; --text-sub: #64748b; --danger: #f43f5e; --border: #f1f5f9; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); display: flex; min-height: 100vh; overflow-x: hidden; }

        /* Banner de Instalação PWA */
        #pwa-install-banner {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: var(--primary); color: white; padding: 15px 25px;
            border-radius: 20px; display: none; align-items: center; gap: 15px;
            z-index: 9999; box-shadow: 0 15px 30px rgba(16, 185, 129, 0.4);
            animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp { from { bottom: -100px; } to { bottom: 20px; } }

        aside { width: 280px; background: var(--sidebar); border-right: 1px solid var(--border); padding: 2.5rem 1.5rem; display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 100; box-shadow: 4px 0 24px rgba(0,0,0,0.02); }
        .logo { font-weight: 800; font-size: 1.4rem; color: var(--primary); letter-spacing: -1px; line-height: 1.1; background: linear-gradient(135deg, var(--primary), #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        nav { margin-top: 2.5rem; flex: 1; }
        nav ul { list-style: none; }
        nav li { padding: 14px 18px; margin-bottom: 8px; border-radius: 14px; cursor: pointer; color: var(--text-sub); transition: 0.3s; font-weight: 600; display: flex; align-items: center; gap: 12px; }
        nav li.active { background: var(--primary); color: white; box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.3); }

        .btn-backup { width: 100%; padding: 10px; margin-top: 8px; border-radius: 10px; border: 1px solid #e2e8f0; background: white; cursor: pointer; font-size: 0.75rem; font-weight: 700; color: var(--text-main); }
        main { flex: 1; margin-left: 280px; padding: 3rem; max-width: 1400px; }
        
        .stats-grid { display: flex; gap: 1rem; overflow-x: auto; padding-bottom: 1rem; margin-bottom: 2rem; scrollbar-width: none; }
        .glass-card { background: white; padding: 1.8rem; border-radius: 28px; border: 1px solid var(--border); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.03); position: relative; margin-bottom: 1.5rem; }
        .acc-card { min-width: 250px; flex-shrink: 0; }
        .type-badge { position: absolute; top: 18px; right: 18px; font-size: 0.6rem; font-weight: 800; padding: 4px 10px; border-radius: 10px; text-transform: uppercase; background: #f1f5f9; color: var(--text-sub); }
        .account-balance { font-size: 1.5rem; font-weight: 800; margin-top: 5px; display: block; }

        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; }
        input, select { width: 100%; padding: 14px 18px; border: 1px solid var(--border); border-radius: 16px; background: #f8fafc; margin-bottom: 1.2rem; font-weight: 600; outline: none; }
        .btn-primary { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 18px; cursor: pointer; font-weight: 700; width: 100%; font-size: 1rem; transition: 0.3s; }
        
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 1.2rem; border-bottom: 1px solid #f8fafc; }
        .val-in { color: #10b981; font-weight: 800; }
        .val-out { color: #f43f5e; font-weight: 800; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="pwa-install-banner">
    <span style="font-weight: 700; font-size: 0.9rem;">Instalar Patrimônio Pro no seu dispositivo?</span>
    <div style="display: flex; gap: 10px;">
        <button onclick="installPWA()" style="background: white; color: var(--primary); border: none; padding: 8px 15px; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 0.8rem;">Instalar</button>
        <button onclick="hideInstallBanner()" style="background: rgba(255,255,255,0.2); color: white; border: none; padding: 8px; border-radius: 12px; cursor: pointer;">✕</button>
    </div>
</div>

<aside>
    <div class="logo-area"><span class="logo">PATRIMÔNIO PRO</span></div>
    <nav><ul>
        <li class="active" onclick="showSection('dash', this)">📊 <span>Painel Analítico</span></li>
        <li onclick="showSection('contas', this)">💳 <span>Minhas Contas</span></li>
        <li onclick="showSection('trans', this)">💸 <span>Movimentar</span></li>
    </ul></nav>
    <div style="padding: 1.5rem; background: #f8fafc; border-radius: 20px;">
        <button class="btn-backup" onclick="exportData()">Fazer Backup</button>
        <button class="btn-backup" onclick="document.getElementById('fileIn').click()">Importar Backup</button>
        <input type="file" id="fileIn" class="hidden" onchange="importData(event)">
    </div>
</aside>

<main>
    <div class="header-top"><h1 id="page-title">Painel Analítico</h1><p id="date-now" style="color: var(--text-sub); font-size: 0.95rem; margin-top: 8px;"></p></div>
    
    <section id="sec-dash">
        <div class="stats-grid" id="accounts-summary"></div>
        <div class="glass-card">
            <h3 style="margin-bottom: 1.5rem; font-size: 0.9rem; color: var(--text-sub); text-transform: uppercase;">Evolução do Patrimônio</h3>
            <div style="height: 350px;"><canvas id="chartLineTrend"></canvas></div>
        </div>
        <div style="display:grid; grid-template-columns: 1.8fr 1.2fr; gap: 1.5rem;">
            <div class="glass-card"><h3>Alocação (%)</h3><div style="height: 300px;"><canvas id="chartPie"></canvas></div></div>
            <div class="glass-card"><h3>Últimas Movimentações</h3><div id="recent-history"></div></div>
        </div>
    </section>

    <section id="sec-contas" class="hidden">
        <div class="glass-card">
            <h3>Nova Conta</h3>
            <div class="form-row">
                <input type="text" id="acc-nome" placeholder="Nome do Banco">
                <select id="acc-tipo"><option value="Corrente">Corrente</option><option value="Investimento">Investimento</option><option value="Poupança">Poupança</option></select>
                <input type="number" id="acc-saldo" placeholder="Saldo Inicial (R$)">
            </div>
            <button class="btn-primary" onclick="addAccount()">Cadastrar</button>
            <div id="accounts-list" style="margin-top:20px"></div>
        </div>
    </section>

    <section id="sec-trans" class="hidden">
        <div class="glass-card" style="max-width: 600px; margin: 0 auto;">
            <h3>Lançar Movimentação</h3>
            <label>Conta</label><select id="t-account"></select>
            <div class="form-row">
                <select id="t-type"><option value="in">Entrada (+)</option><option value="out">Saída (-)</option></select>
                <input type="number" id="t-valor" placeholder="Valor (R$)">
            </div>
            <label>Data</label><input type="date" id="t-date">
            <label>Descrição</label><input type="text" id="t-desc" placeholder="Ex: Salário">
            <button class="btn-primary" onclick="addTransaction()">Confirmar</button>
        </div>
    </section>
</main>

<script>
    Chart.register(ChartDataLabels);
    let bankDB = JSON.parse(localStorage.getItem('patrimonio_v2_final')) || { accounts: [], history: [] };
    let pieChart, lineChart, deferredPrompt;

    // LÓGICA PWA
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('pwa-install-banner').style.display = 'flex';
    });

    async function installPWA() {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') console.log('App instalado');
            deferredPrompt = null;
            hideInstallBanner();
        }
    }

    function hideInstallBanner() { document.getElementById('pwa-install-banner').style.display = 'none'; }

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw_patrimonio.js').catch(() => {});
    }

    // FUNÇÕES CORE
    function save() { localStorage.setItem('patrimonio_v2_final', JSON.stringify(bankDB)); updateUI(); }

    function showSection(id, el) {
        document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
        document.getElementById('sec-' + id).classList.remove('hidden');
        document.querySelectorAll('nav li').forEach(li => li.classList.remove('active'));
        el.classList.add('active');
        if(id === 'dash') renderCharts();
    }

    function addAccount() {
        const nome = document.getElementById('acc-nome').value, tipo = document.getElementById('acc-tipo').value, saldo = parseFloat(document.getElementById('acc-saldo').value) || 0;
        if(!nome) return alert("Dê um nome ao banco");
        bankDB.accounts.push({ id: 'ID' + Date.now(), nome, tipo, saldo, inicial: saldo });
        save();
    }

    function addTransaction() {
        const accId = document.getElementById('t-account').value;
        const type = document.getElementById('t-type').value, valor = parseFloat(document.getElementById('t-valor').value), desc = document.getElementById('t-desc').value, date = document.getElementById('t-date').value;
        if(!accId || isNaN(valor) || !date) return alert("Preencha Conta, Valor e Data!");
        const acc = bankDB.accounts.find(a => a.id === accId);
        if(type === 'in') acc.saldo += valor; else acc.saldo -= valor;
        bankDB.history.push({ accId, accName: acc.nome, accType: acc.tipo, type, valor, desc, date });
        save();
    }

    function updateUI() {
        document.getElementById('t-account').innerHTML = bankDB.accounts.map(a => `<option value="${a.id}">${a.nome} (${a.tipo})</option>`).join('');
        document.getElementById('accounts-summary').innerHTML = bankDB.accounts.map(a => `
            <div class="glass-card acc-card"><span class="type-badge">${a.tipo}</span><p style="color:var(--text-sub);font-size:0.75rem;font-weight:700;">${a.nome}</p><span class="account-balance">R$ ${a.saldo.toLocaleString('pt-br', {minimumFractionDigits:2})}</span></div>`).join('');
        document.getElementById('recent-history').innerHTML = [...bankDB.history].reverse().slice(0, 5).map(h => `
            <div class="history-item"><div><strong>${h.desc}</strong><br><small>${h.date} • ${h.accName}</small></div><div class="${h.type==='in'?'val-in':'val-out'}">${h.type==='in'?'+':'-'} R$ ${h.valor.toFixed(2)}</div></div>`).join('');
        document.getElementById('accounts-list').innerHTML = bankDB.accounts.map(a => `<div class="history-item">${a.nome} (${a.tipo}) <button onclick="bankDB.accounts=bankDB.accounts.filter(acc=>acc.id!=='${a.id}');save()" style="color:red;border:none;background:none;cursor:pointer">Excluir</button></div>`).join('');
        renderCharts();
    }

    function renderCharts() {
        if(!bankDB.accounts.length) return;
        const ctxP = document.getElementById('chartPie').getContext('2d');
        if(pieChart) pieChart.destroy();
        pieChart = new Chart(ctxP, { type: 'doughnut', data: { labels: bankDB.accounts.map(a => `${a.nome} (${a.tipo})`), datasets: [{ data: bankDB.accounts.map(a => a.saldo), backgroundColor: colors, borderWidth: 0 }] }, options: { responsive: true, maintainAspectRatio: false, cutout: '75%', plugins: { legend: { position: 'bottom' }, datalabels: { display: false } } } });

        const ctxL = document.getElementById('chartLineTrend').getContext('2d');
        if(lineChart) lineChart.destroy();
        const dates = [...new Set(bankDB.history.map(h => h.date))].sort();
        if(dates.length === 0) dates.push(new Date().toISOString().split('T')[0]);
        const datasets = bankDB.accounts.map((acc, i) => {
            let balance = acc.inicial;
            const dataPoints = dates.map(d => {
                bankDB.history.filter(h => h.accId === acc.id && h.date === d).forEach(t => { if(t.type==='in') balance += t.valor; else balance -= t.valor; });
                return balance;
            });
            return { label: `${acc.nome} (${acc.tipo})`, data: dataPoints, borderColor: colors[i % colors.length], fill: true, tension: 0.3, backgroundColor: colors[i % colors.length]+'10' };
        });
        lineChart = new Chart(ctxL, { type: 'line', data: { labels: dates.map(d => d.split('-').reverse().slice(0,2).join('/')), datasets }, options: { responsive: true, maintainAspectRatio: false, plugins: { datalabels: { display: false } }, scales: { y: { ticks: { callback: v => 'R$ ' + v.toLocaleString() } } } } });
    }

    function exportData() { const a = document.createElement('a'); a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(bankDB)); a.download = 'patrimonio_v2.json'; a.click(); }
    function importData(e) { const r = new FileReader(); r.onload = (ev) => { try { bankDB = JSON.parse(ev.target.result); save(); location.reload(); } catch(err) { alert("Arquivo inválido"); } }; r.readAsText(e.target.files[0]); }

    window.onload = () => { 
        document.getElementById('date-now').innerText = new Date().toLocaleDateString('pt-br', { weekday: 'long', day: 'numeric', month: 'long' }); 
        updateUI(); 
    };
</script>
</body>
</html>
